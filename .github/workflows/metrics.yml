# 1. Go to your GitHub profile repo: github.com/premnath3536/premnath3536
# 2. Create folder: .github/workflows/
# 3. Create file: metrics.yml
# 4. Paste this content (replace old one if exists)
# 5. Go to repo Settings > Actions > General > Workflow permissions
#    Enable "Read and write permissions"
# 6. Run the workflow manually (Actions tab > click workflow > Run workflow)
# ===============================================

name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: premnath3536
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          # Flat Calendar (like LeetCode heatmap)
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # Output settings
          filename: github-contribution-grid.svg
          config_display: large
